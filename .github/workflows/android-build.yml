name: Android Build

# Builds an installable (debug-signed) release APK. Pushes to main (and PRs)
# build + upload the APK as a run artifact for validation. Pushing a version
# tag (e.g. v1.2.0) additionally publishes a GitHub Release with the APK
# attached. No EAS account or signing secrets required.
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

# Needed so a tag build can create the release with the default GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Typecheck
        run: npm run typecheck

      - name: Generate native project (Expo prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Prepare APK
        id: apk
        run: |
          SRC=$(find android/app/build/outputs/apk/release -name '*.apk' | head -n1)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            NAME="${GITHUB_REF_NAME}"
          else
            VERSION=$(node -p "require('./app.json').expo.version")
            NAME="v${VERSION}-build${{ github.run_number }}"
          fi
          DEST="shade-${NAME}.apk"
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shade-release-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Shade ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Automated release build of Shade.

            Download the `.apk` below and sideload it on Android
            (enable "install from unknown sources" for your browser/Files app).
          files: ${{ steps.apk.outputs.path }}
