name: Android Build

# Builds an installable (debug-signed) release APK. Pushes to main (and PRs)
# build + upload the APK as a run artifact for validation. A GitHub Release
# with the APK attached is published either by pushing a version tag (e.g.
# v1.2.0) OR by running this workflow manually with a "version" input.
# No EAS account or signing secrets required.
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to publish, e.g. v1.0.0 (leave blank for a build-only run).'
        required: false
        default: ''

# Needed so a release build can create the tag/release with the default GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Typecheck
        run: npm run typecheck

      - name: Generate native project (Expo prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Prepare APK
        id: apk
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          SRC=$(find android/app/build/outputs/apk/release -name '*.apk' | head -n1)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            NAME="${GITHUB_REF_NAME}"
          elif [[ -n "${INPUT_VERSION}" ]]; then
            NAME="${INPUT_VERSION}"
          else
            VERSION=$(node -p "require('./app.json').expo.version")
            NAME="v${VERSION}-build${{ github.run_number }}"
          fi
          DEST="shade-${NAME}.apk"
          cp "$SRC" "$DEST"
          echo "release_tag=$NAME" >> "$GITHUB_OUTPUT"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shade-release-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.apk.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: Shade ${{ steps.apk.outputs.release_tag }}
          generate_release_notes: true
          body: |
            Automated release build of Shade.

            Download the `.apk` below and sideload it on Android
            (enable "install from unknown sources" for your browser/Files app).
          files: ${{ steps.apk.outputs.path }}
